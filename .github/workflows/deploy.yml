name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute Next.js base path
        id: basepath
        run: |
          if [ "$GITHUB_REPOSITORY" = "awscommunitydaybrasil/awscommunitydaybrasil" ]; then
            echo "value=" >> $GITHUB_OUTPUT
          else
            REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
            echo "value=/$REPO_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: norte/.nvmrc

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        working-directory: norte
        run: yarn install --immutable

      - name: Build Next.js (norte)
        working-directory: norte
        run: yarn build
        env:
          NEXT_BASE_PATH: ${{ steps.basepath.outputs.value }}

      - name: Assemble deploy directory
        run: |
          mkdir -p _site/norte

          # Copy static sites and root files
          cp index.html _site/
          cp -r assets _site/ 2>/dev/null || true
          cp -r centrooeste _site/ 2>/dev/null || true
          cp -r sudeste _site/ 2>/dev/null || true
          cp -r hist _site/ 2>/dev/null || true

          # Copy .nojekyll, sitemap and robots
          cp .nojekyll _site/
          cp sitemap.xml _site/ 2>/dev/null || true
          cp robots.txt _site/ 2>/dev/null || true

          # Copy built Norte site
          cp -r norte/dist/. _site/norte/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
